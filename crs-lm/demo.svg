<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"></stop>
      <stop offset="100%" stop-color="#111827"></stop>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"></stop>
      <stop offset="100%" stop-color="#f97316"></stop>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .sub { font: 16px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .terminal { fill: #020617; stroke: #334155; stroke-width: 1.5; }
      .termText { font: 16px 'Consolas', 'Courier New', monospace; fill: #e2e8f0; }
      .muted { fill: #94a3b8; }
      .green { fill: #22c55e; }
      .orange { fill: #f97316; }
      .blue { fill: #60a5fa; }
      .red { fill: #ef4444; }
      .chip { fill: #0f172a; stroke: #334155; stroke-width: 1; }
      .label { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .blink {
        animation: blink 1.2s steps(1) infinite;
      }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        50.01%, 100% { opacity: 0; }
      }
      .fade1 { animation: fade1 12s infinite; }
      .fade2 { animation: fade2 12s infinite; }
      .fade3 { animation: fade3 12s infinite; }
      .fade4 { animation: fade4 12s infinite; }
      .fade5 { animation: fade5 12s infinite; }

      @keyframes fade1 {
        0%, 18% { opacity: 1; }
        20%, 100% { opacity: 0.12; }
      }
      @keyframes fade2 {
        0%, 18% { opacity: 0.12; }
        20%, 38% { opacity: 1; }
        40%, 100% { opacity: 0.12; }
      }
      @keyframes fade3 {
        0%, 38% { opacity: 0.12; }
        40%, 58% { opacity: 1; }
        60%, 100% { opacity: 0.12; }
      }
      @keyframes fade4 {
        0%, 58% { opacity: 0.12; }
        60%, 78% { opacity: 1; }
        80%, 100% { opacity: 0.12; }
      }
      @keyframes fade5 {
        0%, 78% { opacity: 0.12; }
        80%, 98% { opacity: 1; }
        100% { opacity: 0.12; }
      }
      .flow {
        stroke: url(#accent);
        stroke-width: 3;
        stroke-dasharray: 10 12;
        animation: dash 5s linear infinite;
      }
      @keyframes dash {
        to { stroke-dashoffset: -88; }
      }
    </style>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"></rect>

  <text x="50" y="52" class="title">CRS-LM Demo Layer</text>
  <text x="50" y="80" class="sub">Animated terminal-style walkthrough of the current experiment</text>

  <!-- top chips -->
  <rect x="50" y="102" width="145" height="30" rx="15" class="chip"></rect>
  <text x="72" y="122" class="label">Baseline vs CRS</text>

  <rect x="210" y="102" width="125" height="30" rx="15" class="chip"></rect>
  <text x="236" y="122" class="label">Token Tradeoff</text>

  <rect x="350" y="102" width="140" height="30" rx="15" class="chip"></rect>
  <text x="374" y="122" class="label">Measured Output</text>

  <!-- terminal -->
  <rect x="50" y="155" width="760" height="310" rx="18" class="terminal"></rect>
  <circle cx="82" cy="180" r="6" fill="#ef4444"></circle>
  <circle cx="104" cy="180" r="6" fill="#f59e0b"></circle>
  <circle cx="126" cy="180" r="6" fill="#22c55e"></circle>

  <text x="155" y="185" class="termText muted">C:\Users\Hp\Desktop\GitHUB-Projects\mos-parameter-golf\crs-lm&gt;</text>

  <g class="fade1">
    <text x="75" y="225" class="termText blue">python compare.py</text>
    <text x="75" y="265" class="termText muted">Running with USE_CRS=False, KEEP_RATIO=1.0</text>
    <text x="75" y="300" class="termText">raw_tokens=81, final_tokens=81</text>
    <text x="75" y="335" class="termText">final_loss=0.1873</text>
    <text x="75" y="370" class="termText">train_time_sec=0.4465</text>
  </g>

  <g class="fade2">
    <text x="75" y="225" class="termText blue">python compare.py</text>
    <text x="75" y="265" class="termText muted">Running with USE_CRS=True, KEEP_RATIO=0.85</text>
    <text x="75" y="300" class="termText">raw_tokens=81, final_tokens=79</text>
    <text x="75" y="335" class="termText">final_loss=0.1753</text>
    <text x="75" y="370" class="termText">train_time_sec=0.4194</text>
  </g>

  <g class="fade3">
    <text x="75" y="225" class="termText blue">python compare.py</text>
    <text x="75" y="265" class="termText muted">Running with USE_CRS=True, KEEP_RATIO=0.75</text>
    <text x="75" y="300" class="termText">raw_tokens=81, final_tokens=76</text>
    <text x="75" y="335" class="termText green">final_loss=0.1824</text>
    <text x="75" y="370" class="termText">train_time_sec=0.4036</text>
  </g>

  <g class="fade4">
    <text x="75" y="225" class="termText blue">python compare.py</text>
    <text x="75" y="265" class="termText muted">Running with USE_CRS=True, KEEP_RATIO=0.60</text>
    <text x="75" y="300" class="termText">raw_tokens=81, final_tokens=72</text>
    <text x="75" y="335" class="termText red">final_loss=0.1932</text>
    <text x="75" y="370" class="termText">train_time_sec=0.4181</text>
  </g>

  <g class="fade5">
    <text x="75" y="225" class="termText orange">CRS Controlled Sweep Summary</text>
    <text x="75" y="270" class="termText">baseline   81 → 81   loss 0.1873</text>
    <text x="75" y="305" class="termText">sacr 0.85  81 → 79   loss 0.1753</text>
    <text x="75" y="340" class="termText green">sacr 0.75  81 → 76   loss 0.1824   &lt; best practical</text>
    <text x="75" y="375" class="termText">sacr 0.60  81 → 72   loss 0.1932</text>
  </g>

  <text x="75" y="430" class="termText muted">_</text>
  <text x="85" y="430" class="termText muted blink">█</text>

  <!-- right analysis card -->
  <rect x="850" y="155" width="300" height="150" rx="18" fill="#ffffff" stroke="#dbeafe"></rect>
  <text x="875" y="190" class="metric" style="font:700 18px Arial,sans-serif; fill:#0f172a;">Best Practical Sweep</text>
  <text x="875" y="225" class="sub" style="fill:#334155;">SACR 0.75</text>
  <text x="875" y="255" class="sub" style="fill:#334155;">Tokens: 81 → 76</text>
  <text x="875" y="280" class="sub" style="fill:#334155;">Loss: 0.1873 → 0.1824</text>

  <!-- right mini flow -->
  <rect x="850" y="330" width="300" height="135" rx="18" fill="#ffffff" stroke="#dbeafe"></rect>
  <text x="875" y="365" class="metric" style="font:700 18px Arial,sans-serif; fill:#0f172a;">Interpretation</text>
  <text x="875" y="397" class="sub" style="fill:#334155;">• Light reduction can work</text>
  <text x="875" y="422" class="sub" style="fill:#334155;">• Sequence structure matters</text>
  <text x="875" y="447" class="sub" style="fill:#334155;">• Aggressive filtering degrades quality</text>

  <!-- bottom flow -->
  <path d="M 80 490 C 250 490, 350 490, 540 490 C 720 490, 850 490, 1080 490" fill="none" class="flow" filter="url(#glow)"></path>
  <circle cx="80" cy="490" r="7" fill="#2563eb" filter="url(#glow)">
    <animate attributeName="cx" values="80;1080" dur="4.8s" repeatCount="indefinite"></animate>
  </circle>
</svg>