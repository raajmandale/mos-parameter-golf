<svg width="1400" height="560" viewBox="0 0 1400 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"></stop>
      <stop offset="100%" stop-color="#eef5ff"></stop>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"></stop>
      <stop offset="100%" stop-color="#f97316"></stop>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.25"></feDropShadow>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <style>
      .title {
        font: 700 32px 'Segoe UI', Arial, sans-serif;
        fill: #0f172a;
      }
      .subtitle {
        font: 16px 'Segoe UI', Arial, sans-serif;
        fill: #475569;
      }
      .boxTitle {
        font: 700 18px 'Segoe UI', Arial, sans-serif;
        fill: #0f172a;
      }
      .boxText {
        font: 14px 'Segoe UI', Arial, sans-serif;
        fill: #475569;
      }
      .sectionLabel {
        font: 700 14px 'Segoe UI', Arial, sans-serif;
        fill: #2563eb;
        letter-spacing: 0.5px;
      }
      .metric {
        font: 700 14px 'Segoe UI', Arial, sans-serif;
        fill: #111827;
      }
      .small {
        font: 13px 'Segoe UI', Arial, sans-serif;
        fill: #64748b;
      }
      .wire {
        stroke: #94a3b8;
        stroke-width: 3;
        fill: none;
        opacity: 0.55;
      }
      .flow {
        stroke: url(#accent);
        stroke-width: 4;
        fill: none;
        stroke-linecap: round;
        stroke-dasharray: 10 14;
        animation: dash 7s linear infinite;
      }
      @keyframes dash {
        to { stroke-dashoffset: -96; }
      }
      .pulseA {
        animation: pulseA 2.8s ease-in-out infinite;
        transform-origin: center;
      }
      @keyframes pulseA {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.18); }
      }
      .floatA {
        animation: floatA 5.5s ease-in-out infinite;
      }
      .floatB {
        animation: floatB 6.5s ease-in-out infinite;
      }
      @keyframes floatA {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }
      @keyframes floatB {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(6px); }
      }
      .chip {
        fill: #ffffff;
        stroke: #dbeafe;
        stroke-width: 1.5;
      }
      .nodeBlue { fill: #2563eb; }
      .nodeOrange { fill: #f97316; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1400" height="560" fill="url(#bg)"></rect>

  <!-- Header -->
  <text x="60" y="62" class="title">CRS-LM Architecture</text>
  <text x="60" y="92" class="subtitle">Structure-Aware Context Reduction pipeline for tiny language model efficiency</text>
  <rect x="60" y="108" width="420" height="4" rx="2" fill="url(#accent)"></rect>

  <!-- Stage labels -->
  <text x="95" y="150" class="sectionLabel">INPUT</text>
  <text x="360" y="150" class="sectionLabel">TOKENIZATION</text>
  <text x="635" y="150" class="sectionLabel">SACR FILTER</text>
  <text x="930" y="150" class="sectionLabel">TINyLM</text>
  <text x="1195" y="150" class="sectionLabel">OUTPUT</text>

  <!-- Main boxes -->
  <g class="floatA">
    <rect x="60" y="180" rx="20" ry="20" width="210" height="180" fill="#ffffff" stroke="#dbeafe" filter="url(#softShadow)"></rect>
    <text x="85" y="220" class="boxTitle">Input Text</text>
    <text x="85" y="252" class="boxText">Raw context arrives as</text>
    <text x="85" y="274" class="boxText">flat token-bearing text.</text>

    <rect x="85" y="300" rx="12" ry="12" width="160" height="34" class="chip"></rect>
    <text x="101" y="322" class="small">raw context stream</text>
  </g>

  <g class="floatB">
    <rect x="325" y="180" rx="20" ry="20" width="230" height="180" fill="#ffffff" stroke="#dbeafe" filter="url(#softShadow)"></rect>
    <text x="350" y="220" class="boxTitle">Tokenizer</text>
    <text x="350" y="252" class="boxText">Converts text into token IDs</text>
    <text x="350" y="274" class="boxText">for compact LM processing.</text>

    <rect x="350" y="300" rx="12" ry="12" width="180" height="34" class="chip"></rect>
    <text x="368" y="322" class="small">token IDs + sequence order</text>
  </g>

  <g class="floatA">
    <rect x="615" y="160" rx="24" ry="24" width="280" height="220" fill="#ffffff" stroke="#dbeafe" filter="url(#softShadow)"></rect>
    <text x="640" y="205" class="boxTitle">SACR — Structure-Aware Context Reduction</text>
    <text x="640" y="238" class="boxText">Scores token usefulness, preserves</text>
    <text x="640" y="260" class="boxText">neighbors, and keeps sequence anchors.</text>

    <rect x="640" y="290" rx="12" ry="12" width="220" height="34" class="chip"></rect>
    <text x="659" y="312" class="small">filter noise • preserve structure</text>

    <rect x="640" y="336" rx="12" ry="12" width="220" height="34" class="chip"></rect>
    <text x="664" y="358" class="small">raw tokens → compact sequence</text>
  </g>

  <g class="floatB">
    <rect x="940" y="180" rx="20" ry="20" width="210" height="180" fill="#ffffff" stroke="#dbeafe" filter="url(#softShadow)"></rect>
    <text x="965" y="220" class="boxTitle">TinyLM</text>
    <text x="965" y="252" class="boxText">Processes reduced sequence</text>
    <text x="965" y="274" class="boxText">for next-token learning.</text>

    <rect x="965" y="300" rx="12" ry="12" width="160" height="34" class="chip"></rect>
    <text x="992" y="322" class="small">GRU-based tiny model</text>
  </g>

  <g class="floatA">
    <rect x="1200" y="180" rx="20" ry="20" width="150" height="180" fill="#ffffff" stroke="#dbeafe" filter="url(#softShadow)"></rect>
    <text x="1225" y="220" class="boxTitle">Output</text>
    <text x="1225" y="252" class="boxText">Loss /</text>
    <text x="1225" y="274" class="boxText">prediction</text>

    <rect x="1225" y="300" rx="12" ry="12" width="100" height="34" class="chip"></rect>
    <text x="1242" y="322" class="small">result</text>
  </g>

  <!-- Static wires -->
  <path d="M270 270 C300 270, 305 270, 325 270" class="wire"></path>
  <path d="M555 270 C585 270, 590 270, 615 270" class="wire"></path>
  <path d="M895 270 C920 270, 920 270, 940 270" class="wire"></path>
  <path d="M1150 270 C1175 270, 1175 270, 1200 270" class="wire"></path>

  <!-- Animated flow paths -->
  <path id="flow1" d="M270 270 C300 270, 305 270, 325 270" stroke="none" fill="none"></path>
  <path id="flow2" d="M555 270 C585 270, 590 270, 615 270" stroke="none" fill="none"></path>
  <path id="flow3" d="M895 270 C920 270, 920 270, 940 270" stroke="none" fill="none"></path>
  <path id="flow4" d="M1150 270 C1175 270, 1175 270, 1200 270" stroke="none" fill="none"></path>

  <path d="M270 270 C300 270, 305 270, 325 270" class="flow" filter="url(#glow)"></path>
  <path d="M555 270 C585 270, 590 270, 615 270" class="flow" filter="url(#glow)"></path>
  <path d="M895 270 C920 270, 920 270, 940 270" class="flow" filter="url(#glow)"></path>
  <path d="M1150 270 C1175 270, 1175 270, 1200 270" class="flow" filter="url(#glow)"></path>

  <!-- Moving packets -->
  <circle r="7" class="nodeBlue pulseA" filter="url(#glow)">
    <animateMotion dur="4.8s" repeatCount="indefinite">
      <mpath href="#flow1"></mpath>
    </animateMotion>
  </circle>
  <circle r="6" class="nodeOrange pulseA" filter="url(#glow)">
    <animateMotion dur="5.2s" begin="0.8s" repeatCount="indefinite">
      <mpath href="#flow2"></mpath>
    </animateMotion>
  </circle>
  <circle r="7" class="nodeBlue pulseA" filter="url(#glow)">
    <animateMotion dur="4.6s" begin="1.1s" repeatCount="indefinite">
      <mpath href="#flow3"></mpath>
    </animateMotion>
  </circle>
  <circle r="6" class="nodeOrange pulseA" filter="url(#glow)">
    <animateMotion dur="5.0s" begin="1.6s" repeatCount="indefinite">
      <mpath href="#flow4"></mpath>
    </animateMotion>
  </circle>

  <!-- Bottom comparison area -->
  <rect x="60" y="430" rx="20" ry="20" width="1290" height="95" fill="#ffffff" stroke="#dbeafe" filter="url(#softShadow)"></rect>
  <text x="90" y="465" class="boxTitle">Controlled Sweep Snapshot</text>
  <text x="90" y="492" class="boxText">Baseline: 81 tokens, loss 0.1873</text>
  <text x="90" y="514" class="boxText">SACR (0.75): 76 tokens, loss 0.1824</text>

  <text x="510" y="465" class="boxTitle">Key Insight</text>
  <text x="510" y="492" class="boxText">Light structure-aware reduction can preserve sequence quality</text>
  <text x="510" y="514" class="boxText">better than naive token dropping.</text>

  <text x="1015" y="465" class="metric">Reduce Input</text>
  <text x="1015" y="492" class="metric">Preserve Structure</text>
  <text x="1015" y="519" class="metric">Improve Efficiency</text>

  <circle cx="1170" cy="462" r="6" class="nodeBlue pulseA"></circle>
  <circle cx="1170" cy="489" r="6" class="nodeOrange pulseA"></circle>
  <circle cx="1170" cy="516" r="6" class="nodeBlue pulseA"></circle>
</svg>