<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6faff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title { font: 700 48px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .subtitle { font: 20px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .meta { font: 16px 'Segoe UI', Arial, sans-serif; fill: #6b7280; }
      .metric { font: 14px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .metricStrong { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .packetBlue { fill: #2563eb; opacity: 0.75; }
      .packetOrange { fill: #f97316; opacity: 0.75; }
      .nodeBlue { fill: #2563eb; opacity: 0.55; }
      .nodeOrange { fill: #f97316; opacity: 0.55; }
      .wire { stroke: #94a3b8; stroke-width: 1.2; opacity: 0.35; }
      .dashedFlow { stroke: url(#accent); stroke-width: 2; stroke-linecap: round; stroke-dasharray: 6 10; opacity: 0.7; animation: dashmove 6s linear infinite; }
      @keyframes dashmove { to { stroke-dashoffset: -64; } }
      .pulse { animation: pulse 2.8s ease-in-out infinite; transform-origin: center; }
      @keyframes pulse { 0%, 100% { opacity: 0.45; transform: scale(1); } 50% { opacity: 0.9; transform: scale(1.18); } }
      .floatA { animation: floatA 5s ease-in-out infinite; }
      .floatB { animation: floatB 6.5s ease-in-out infinite; }
      @keyframes floatA { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
      @keyframes floatB { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(5px); } }
    </style>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <line x1="120" y1="75" x2="205" y2="110" class="wire"/>
  <line x1="205" y1="110" x2="290" y2="72" class="wire"/>
  <line x1="290" y1="72" x2="380" y2="110" class="wire"/>
  <line x1="205" y1="110" x2="250" y2="160" class="wire"/>
  <line x1="250" y1="160" x2="345" y2="150" class="wire"/>
  <circle cx="120" cy="75" r="4" class="nodeBlue pulse"/>
  <circle cx="205" cy="110" r="5" class="nodeOrange pulse"/>
  <circle cx="290" cy="72" r="4" class="nodeBlue pulse"/>
  <circle cx="380" cy="110" r="5" class="nodeOrange pulse"/>
  <circle cx="250" cy="160" r="4" class="nodeBlue pulse"/>
  <circle cx="345" cy="150" r="4" class="nodeOrange pulse"/>
  <path d="M 430 150 C 530 150, 610 150, 710 150" fill="none" class="dashedFlow" filter="url(#softGlow)"/>
  <circle r="6" class="packetBlue" filter="url(#softGlow)"><animateMotion dur="4.2s" repeatCount="indefinite" rotate="auto"><mpath href="#flowPath1"/></animateMotion></circle>
  <circle r="5" class="packetOrange" filter="url(#softGlow)"><animateMotion dur="5.4s" begin="0.8s" repeatCount="indefinite" rotate="auto"><mpath href="#flowPath1"/></animateMotion></circle>
  <circle r="4" class="packetBlue" filter="url(#softGlow)"><animateMotion dur="6.2s" begin="1.4s" repeatCount="indefinite" rotate="auto"><mpath href="#flowPath1"/></animateMotion></circle>
  <path id="flowPath1" d="M 430 150 C 530 150, 610 150, 710 150" fill="none" stroke="none"/>
  <text x="60" y="185" class="title">CRS-LM</text>
  <text x="60" y="220" class="subtitle">Context Reconstruction for Language Models</text>
  <rect x="60" y="235" width="430" height="4" rx="2" fill="url(#accent)"/>
  <text x="60" y="263" class="meta">Reduce Input • Preserve Structure • Improve Efficiency</text>
  <g class="floatA">
    <rect x="760" y="58" width="360" height="180" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="785" y="96" class="metricStrong">Experimental Sweet Spot</text>
    <text x="785" y="130" class="metric">Baseline Tokens: 81</text>
    <text x="785" y="155" class="metric">CRS Tokens: 76</text>
    <text x="785" y="180" class="metric">Baseline Loss: 0.1873</text>
    <text x="785" y="205" class="metric">CRS Loss: 0.1824</text>
    <text x="785" y="228" class="metricStrong">Structured filtering preserved sequence quality</text>
  </g>
  <g class="floatB">
    <line x1="1030" y1="88" x2="1088" y2="88" class="wire"/>
    <line x1="1030" y1="118" x2="1100" y2="118" class="wire"/>
    <line x1="1030" y1="148" x2="1082" y2="148" class="wire"/>
    <circle cx="1030" cy="88" r="5" class="nodeBlue pulse"/>
    <circle cx="1088" cy="88" r="6" class="nodeOrange pulse"/>
    <circle cx="1030" cy="118" r="5" class="nodeBlue pulse"/>
    <circle cx="1100" cy="118" r="6" class="nodeOrange pulse"/>
    <circle cx="1030" cy="148" r="5" class="nodeBlue pulse"/>
    <circle cx="1082" cy="148" r="6" class="nodeOrange pulse"/>
  </g>
</svg>
